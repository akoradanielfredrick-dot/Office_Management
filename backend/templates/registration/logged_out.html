<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logged Out | Mranga Admin Portal</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #f2f6f0 0%, #f4f7f3 100%);
      color: #162033;
    }
    .card {
      width: min(100%, 520px);
      margin: 24px;
      padding: 40px;
      border-radius: 28px;
      background: #fff;
      border: 1px solid #dbe4df;
      box-shadow: 0 24px 60px -32px rgba(15, 36, 20, 0.28);
      text-align: center;
    }
    .mark {
      width: 64px;
      height: 64px;
      margin: 0 auto 18px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #edf6ee, #f7edd2);
      color: #1f5f2b;
      font-weight: 800;
      letter-spacing: 0.08em;
    }
    h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: -0.03em;
    }
    p {
      margin: 14px 0 0;
      color: #677286;
      line-height: 1.8;
      font-size: 15px;
    }
    a {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 22px;
      border-radius: 16px;
      background: linear-gradient(180deg, #1f5f2b 0%, #123c1a 100%);
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 18px 34px -20px rgba(18, 60, 26, 0.85);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">MT</div>
    <h1>Logged Out</h1>
    <p>Your administrative session has ended successfully. Sign in again whenever you are ready to continue managing the office system.</p>
    <a href="/admin/login/">Return to Admin Login</a>
  </div>
</body>
</html>
